<!--
/**
 * This is the HTML template for our custom payment method.
 * It will be rendered on the checkout page.
 */
-->
<div
    class="payment-method"
    data-bind="css: {'_active': (getCode() == isChecked())}"
>
    <div class="payment-method-title field choice">
        <!-- We select our payment method by default -->
        <input
            type="radio"
            name="payment[method]"
            class="radio"
            data-bind="attr: {'id': getCode()}, value: getCode(), checked: isChecked, click: selectPaymentMethod, visible: isRadioButtonVisible()"
        />
        <label data-bind="attr: {'for': getCode()}" class="label">
            <span data-bind="text: getTitle()"></span>
        </label>
    </div>

    <div class="payment-method-content">
        <!-- Error messages will be displayed here -->
        <div class="payment-method-billing-address">
            <!-- ko foreach: $parent.getRegion(getBillingAddressFormName()) -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>

        <!-- 
        THIS IS THE CONTAINER FOR MONEYHASH SDK's UI.
        The `afterRender` binding calls our `initSdk` function from the JS file
        once this div has been added to the page.
        -->
        <div id="mh-sdk-container" data-bind="afterRender: initSdk">
            <p>Loading Secure Checkout...</p>
        </div>

        <div class="checkout-agreements-block">
            <!-- ko foreach: $parent.getRegion('before-place-order') -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>

        <!-- 
        The "Place Order" button is handled by your SDK's UI.
        We don't need the default Magento button here.
        -->
    </div>
</div>
